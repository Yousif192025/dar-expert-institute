<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0B1D5C">
<title>404 – الصفحة غير موجودة | معهد دار الخبراء</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{--navy:#0B1D5C;--navy-dark:#071240;--gold:#C8952A;--gold-light:#F0C060;--font:'Cairo',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:var(--font);direction:rtl;overflow-x:hidden}
body{background:linear-gradient(155deg,#071240 0%,#0B1D5C 50%,#1A2E6E 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;padding:24px;position:relative}
body::before{content:'';position:absolute;inset:0;
  background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),
  linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);
  background-size:60px 60px}
.wrap{position:relative;z-index:2;text-align:center;max-width:560px}
.num{font-size:clamp(100px,20vw,180px);font-weight:900;color:transparent;
  background:linear-gradient(135deg,var(--gold),var(--gold-light));
  -webkit-background-clip:text;background-clip:text;line-height:1;
  animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
.ico{font-size:clamp(48px,8vw,72px);color:rgba(200,149,42,.35);margin-bottom:16px;
  animation:spin 8s linear infinite}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
h1{font-size:clamp(22px,4vw,32px);font-weight:900;color:#fff;margin-bottom:12px}
p{font-size:15px;color:rgba(168,188,223,.8);line-height:1.8;margin-bottom:32px}
.btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.btn-p{display:inline-flex;align-items:center;gap:9px;
  background:linear-gradient(135deg,var(--gold),var(--gold-light));
  color:var(--navy-dark);border:none;padding:13px 28px;border-radius:12px;
  font-weight:800;font-size:14.5px;text-decoration:none;font-family:var(--font);
  transition:transform .3s,box-shadow .3s}
.btn-p:hover{transform:translateY(-3px);color:var(--navy-dark)}
.btn-o{display:inline-flex;align-items:center;gap:9px;
  background:rgba(255,255,255,.08);color:#fff;
  border:1.5px solid rgba(255,255,255,.25);padding:12px 24px;border-radius:12px;
  font-weight:600;font-size:14.5px;text-decoration:none;font-family:var(--font);
  transition:background .3s}
.btn-o:hover{background:rgba(255,255,255,.16);color:#fff}
.quick-links{margin-top:44px;display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%}
.ql{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
  border-radius:12px;padding:14px 10px;text-align:center;text-decoration:none;
  color:rgba(168,188,223,.85);font-size:12.5px;font-weight:600;transition:all .25s}
.ql:hover{background:rgba(200,149,42,.15);border-color:rgba(200,149,42,.35);color:var(--gold-light)}
.ql i{display:block;font-size:22px;margin-bottom:7px;color:var(--gold-light);opacity:.7}
.brand{position:absolute;top:24px;right:24px;display:flex;align-items:center;gap:10px;text-decoration:none}
.b-logo{width:40px;height:40px;border-radius:10px;
  background:linear-gradient(135deg,var(--gold),var(--gold-light));
  display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:var(--navy-dark)}
.b-name{color:#fff;font-size:13px;font-weight:800}
@media(max-width:480px){.quick-links{grid-template-columns:1fr 1fr}.btns{flex-direction:column;align-items:center}}
</style>
</head>
<body>
<a class="brand" href="index.html"><div class="b-logo">دخ</div><span class="b-name">دار الخبراء</span></a>
<div class="wrap">
  <i class="fas fa-compass ico"></i>
  <div class="num">404</div>
  <h1>عذراً! هذه الصفحة غير موجودة</h1>
  <p>يبدو أن الصفحة التي تبحث عنها قد نُقلت أو حُذفت أو لم تكن موجودة أصلاً. لا تقلق، يمكنك العودة للرئيسية أو استعراض برامجنا.</p>
  <div class="btns">
    <a href="index.html" class="btn-p"><i class="fas fa-home"></i>العودة للرئيسية</a>
    <a href="programs/index.html" class="btn-o"><i class="fas fa-book-open"></i>استعرض البرامج</a>
  </div>
  <div class="quick-links">
    <a class="ql" href="about.html"><i class="fas fa-building-columns"></i>من نحن</a>
    <a class="ql" href="programs/index.html"><i class="fas fa-graduation-cap"></i>البرامج</a>
    <a class="ql" href="corporate.html"><i class="fas fa-building"></i>مؤسسي</a>
    <a class="ql" href="services.html"><i class="fas fa-briefcase"></i>الاستشارات</a>
    <a class="ql" href="news/index.html"><i class="fas fa-newspaper"></i>الأخبار</a>
    <a class="ql" href="contact.html"><i class="fas fa-phone"></i>تواصل</a>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body></html>
